name: Learn Persona

on:
  schedule:
    # Runs at 20:00 UTC, which is 05:00 JST (1 hour before daily news)
    # This evaluates yesterday's issue to update the persona.
    - cron: '0 20 * * *'
  workflow_dispatch: # Allows manual triggering
  
jobs:
  learn:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: write # Needed to commit persona.json back to repo
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Ensure we fetch history so we can commit back seamlessly
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci || npm install

      - name: Build TypeScript
        run: npx tsc
        
      - name: Run Persona Learner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node dist/index.js learn
        
      - name: Commit updated persona.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/persona.json
          git commit -m "chore(ai): update persona.json based on reading habits" || echo "No changes to commit"
          git push
